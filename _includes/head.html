<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>
  {%- if page.title -%}{{ page.title }} — {{ site.title }}
  {%- else -%}{{ site.title }} — {{ site.tagline }}
  {%- endif -%}
</title>

<meta name="description" content="{{ page.description | default: site.description }}" />
<link rel="canonical" href="{{ page.url | absolute_url }}" />
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

<!-- Favicon -->
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" />


<!--
  FONTS
  $font-body / $font-ui:     Jost (300, 400, 500)
  $font-title:               Nunito (900)
  $font-tagline:             DM Mono (400, 500)
  $font-display (reserved):  Outfit (300, 400, 500) — not yet assigned
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Nunito:wght@900&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />

{% seo %}
