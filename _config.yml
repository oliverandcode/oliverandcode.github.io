theme: jekyll-theme-slate

title: Oliver & Co(de)
description: coding blog, project portfolio, and whimsy
logo: oliverandcode-logo.png
show_downloads: false
# disable url when developing locally!
url: http://www.oliverandcode.com/

# nav links
# if external add external: true
links:
  - title: home
    url: /
    external: false
    # icon: home
  - title: blog
    url: /blog
  - title: projects
    url: /projects
  - title: about
    url: /about

defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
      type: "posts" # previously `post` in Jekyll 2.2.
    values:
      layout: "post"
      author: "Oliver Ayers"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

plugins:
  - jekyll-figure