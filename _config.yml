# =====================================================
#  SITE SETTINGS
#  Edit this file to configure the whole site.
#  These variables are available everywhere as site.*
# =====================================================

# ── Identity ─────────────────────────────────────────
title:       "Oliver & Co(de)" # site name
tagline:     "code + commentary + curiosity" # 3–5 words shown in the header
description: "A software engineer's notes on building things." # NOTE: where does this display? it's referenced in _includes/head.html
logo: assets/img/oliverandcode-logo.png # NOTE: currently unused but might come in handy

author:
  name:     "Oliver Ayers"
  github:   "https://github.com/oliverandcode"
  linkedin: "https://linkedin.com/in/oliver-ayers-090870a3"
  email:    "oliverdayers@gmail.com"

about_photo:
  alt_text: "An orange cat at his computer"
  title: "Oliver at his computer"
  caption: "Oliver at his computer"

dog_photo:
  aria_label: "Click to reveal!"
  alt_text: "A large white dog stares suspiciousy into a mirror abandoned on the sidewalk"
  title: "Roll over!"
  caption: "My dog Cheerio, reflecting on life"
  flip_hint: "Roll over!"
  flip_back_hint: "Click to see my dog again"

# ── Job title shown large on home page ───────────────
job_title: "Software Engineer"

# ── Deploy ───────────────────────────────────────────
baseurl: "" # leave empty for yourusername.github.io
url:     "https://oliverandcode.github.io"

# ── Blog ─────────────────────────────────────────────
blog_headline: "The Poetical Science" # H1 shown on the blog index
default_author: "Oliver Ayers" # used when a post omits `author:`

# TODO: BUGFIX: fix broken pagination (but retain modularization)
# ── Pagination ───────────────────────────────────────
paginate:      10
paginate_path: "/blog/page:num/"

# ── Build ────────────────────────────────────────────
markdown:    kramdown
highlighter: rouge
permalink:   /blog/:year/:month/:day/:title/

# IMPORTANT: Do NOT add jekyll-paginate or jekyll-seo-tag to the plugins
# list below. The github-pages gem already activates them. Declaring them
# a second time causes "stack level too deep" errors at build time.
# Only add plugins here that are NOT already bundled by github-pages.
# plugins:
#   - some-other-plugin

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - "*.zip"
  # begin explicitly excluding old files and directories
  - _drafts/
  - _includes_old/
  - _layouts_old/
  - _posts_old/
  - assets_old
  - _config_old.yml
  - about.md
  - blog.html
  - favicon.png
  - favicon2.png
  - Gemfile_old
  - index_old.md
